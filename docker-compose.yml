services:
  # 数据库
  llm-db:
    image: postgres:15-alpine
    container_name: llm-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: polymath_db
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

  # 后端 (Rust)
  llm-backend:
    build: 
      context: ./llm-tracker-backend
    container_name: llm-backend
    environment:
      DATABASE_URL: postgres://postgres:123@llm-db:5432/polymath_db
      JWT_SECRET: "jkbnm;mp$%bhjkbBVHKLUYIObd232410978K123M"
    depends_on:
      - llm-db

  # 前端 (OpenNJet)
  llm-frontend:
    build:
      context: ./llm-tracker-frontend
    container_name: llm-frontend
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - DAC_READ_SEARCH
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
      - NET_ADMIN
      - NET_RAW
      - AUDIT_WRITE
    ports:
      - "80:80"
      # - "443:443"
    # volumes:
      # - ./certbot/conf:/etc/letsencrypt
      # - ./certbot/www:/usr/share/njet/html
    depends_on:
      - llm-backend

  # 证书申请与续期 (Certbot)
  # certbot:
  #   image: certbot/certbot
  #   container_name: certbot
  #   volumes:
  #     - ./certbot/conf:/etc/letsencrypt
  #     - ./certbot/www:/usr/share/njet/html
  #   entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12d & wait $${!}; done;'"

volumes:
  postgres_data:
  # certbot_conf:

